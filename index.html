<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars 100 Brawlers Prime</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Arial', sans-serif; text-align: center; }
        .controls { position: sticky; top: 0; background: #222; padding: 20px; z-index: 100; border-bottom: 3px solid #444; }
        .btn { padding: 10px 20px; margin: 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-1 { background: #cd7f32; color: white; }
        .btn-2 { background: #c0c0c0; color: #111; }
        .btn-3 { background: #ffd700; color: #111; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 15px; }
        .card { background: #2d2d2d; border-radius: 15px; padding: 15px; width: 140px; border: 2px solid #444; }
        .card img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .trophies { font-size: 18px; color: #ffcc00; margin: 10px 0; font-weight: bold; }
        .tag { font-size: 12px; padding: 4px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        
        /* Цвета уровней */
        .lvl-1 { background: #cd7f32; }
        .lvl-2 { background: #c0c0c0; color: #111; }
        .lvl-3 { background: #ffd700; color: #111; box-shadow: 0 0 10px #ffd700; }
    </style>
</head>
<body>

<div class="controls">
    <h2>Challenge Generator </h2>
    <button class="btn btn-1" onclick="generate(1, 1000, 'lvl-1')">Prime 1 (1-1000)</button>
    <button class="btn btn-2" onclick="generate(1001, 2000, 'lvl-2')">Prime 2 (1001-2000)</button>
    <button class="btn btn-3" onclick="generate(2001, 3000, 'lvl-3')">Prime 3 (2001-3000)</button>
</div>

<div class="container" id="grid"></div>

<script>
// Список некоторых бойцов для примера (всех 100 вручную в код вставлять долго, но логика одна)
const brawlers = [
    "shelly", "colt", "bull", "brock", "barley", "rico", "spike", "mortis", "dynamike", "bo",
    "crow", "poco", "darryl", "penny", "frank", "tara", "pam", "gene", "tick", "leon",
    "rosa", "carl", "bibi", "8-bit", "sandy", "bea", "emz", "mr. p", "max", "jacky",
    "gale", "nani", "sprout", "surge", "colette", "lou", "byron", "edgar", "amber", "colonel ruffs",
    "stu", "belle", "squeak", "buzz", "griff", "ash", "meg", "lola", "fang", "eve",
    "janet", "bonnie", "otis", "sam", "gus", "buster", "chester", "gray", "rt", "maisie",
    "hank", "cordelius", "doug", "pearl", "chuck", "charlie", "mico", "kit", "larry & lawrie", "melodie",
    "lily", "draco", "berry", "clancy", "moe", "kenji", "juju", "shade", "sirius", "angelo",
    "willow", "volt", "glowbert", "trunk", "ollie", "pierce", "mina", "mipple", "juju"
];



function generate(min, max, css) {
    const grid = document.getElementById('grid');
    grid.innerHTML = ''; 

    brawlers.forEach(name => {
        const trophies = Math.floor(Math.random() * (max - min + 1)) + min;
        const levelText = css === 'lvl-1' ? "1 Уровень" : css === 'lvl-2' ? "2 Уровень" : "3 Уровень";
        
        grid.innerHTML += `
            <div class="card">
                <img src="https://cdn-old.fankit.brawlstars.com/brawlers/icons/${name}.png" 
                     onerror="this.src='https://cdn.pixabay.com/photo/2016/08/08/09/17/avatar-1577909_1280.png'" 
                     alt="${name}">
                <div style="text-transform: capitalize; margin-top:5px;">${name}</div>
                <div class="trophies">${trophies} 🏆</div>
                <div class="tag ${css}">${levelText}</div>
            </div>
        `;
    });
}

// Стартовый запуск
generate(1, 1000, 'lvl-1');
</script>

</body>
</html>
